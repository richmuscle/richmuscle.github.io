<!DOCTYPE html>
<!--
  OG image generator — NOT served as a route.
  Open this file in a browser, set viewport to 1200×630, screenshot,
  save as public/og-image.png, then add to Trunk copy-file so /og-image.png is in dist/.
  See the GitHub Actions workflow for the exact procedure.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>OG Image — Richard Mussell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; }
    body {
      width: 1200px;
      height: 630px;
      background: #0a0f1a;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      display: flex;
      flex-direction: column;
      padding: 48px 56px;
    }
    .row { display: flex; flex: 1; min-height: 0; }
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 48px;
    }
    .name {
      font-size: 52px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 12px;
    }
    .title {
      font-size: 24px;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 16px;
      color: #22d3ee;
      letter-spacing: 2px;
    }
    .right {
      width: 420px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }
    .right-text {
      font-size: 18px;
      color: #e2e8f0;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .right-meta {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 1px;
    }
    .bottom-bar {
      border-top: 1px solid #1e2630;
      padding-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #22d3ee;
    }
  </style>
</head>
<body>
  <div class="row">
    <div class="left">
      <div class="name">Richard Mussell</div>
      <div class="title">Linux Systems Administrator</div>
      <div class="tagline">Operations · Infrastructure as Code · Honest about scope</div>
    </div>
    <div class="right">
      <div class="right-text">Documenting how I operate, not what title I'm claiming.</div>
      <div class="right-meta">Oklahoma City · open to remote</div>
    </div>
  </div>
  <div class="bottom-bar">richmuscle.github.io</div>
</body>
</html>
