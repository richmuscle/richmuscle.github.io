name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/
      - name: Install wasm-opt
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
      - name: Build with Trunk (release)
        run: trunk build --release
      - name: Optimize WASM bundle
        run: |
          WASM=$(ls dist/*_bg.wasm)
          wasm-opt --all-features -Oz "$WASM" -o "${WASM}.opt"
          mv "${WASM}.opt" "$WASM"
          echo "WASM size after wasm-opt: $(stat -c%s $WASM) bytes"
      - name: Place fonts, SPA fallback, disable Jekyll
        run: |
          rm -rf dist/fonts
          mkdir -p dist/fonts
          cp -v static/fonts/*.woff2 dist/fonts/
          test -f dist/fonts/geist-400.woff2
          test -f dist/fonts/geist-500.woff2
          test -f dist/fonts/jbmono-400.woff2
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - name: Verify resume PDF present and real
        run: test $(stat -c%s dist/pdfs/resume.pdf) -gt 100000
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
