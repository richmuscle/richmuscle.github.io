name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/
      - name: Build with Trunk (release)
        run: trunk build --release
      - name: Install binaryen + run wasm-opt -Oz
        # Trunk 0.21 doesn't pass through --enable-bulk-memory / --enable-nontrapping-float-to-int
        # (both required by this wasm-bindgen output), which is why Trunk's built-in wasm-opt pass
        # is disabled in index.html. We fetch a pinned binaryen release directly instead — version_123
        # matches Trunk's own bundled version and has been verified locally against this binary.
        # Empirically saves ~10 KB gzipped; bigger savings require dropping the sqlite feature or
        # dropping bundled syntax highlighters.
        run: |
          BINARYEN_VERSION=version_123
          wget -qO- "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar -xzf-
          sudo mv "binaryen-${BINARYEN_VERSION}/bin/wasm-opt" /usr/local/bin/
          WASM_FILE=$(ls dist/*_bg.wasm)
          PRE_SIZE=$(stat -c%s "$WASM_FILE")
          PRE_GZIP=$(gzip -c "$WASM_FILE" | wc -c)
          wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int "$WASM_FILE" -o "${WASM_FILE}.opt"
          mv "${WASM_FILE}.opt" "$WASM_FILE"
          POST_SIZE=$(stat -c%s "$WASM_FILE")
          POST_GZIP=$(gzip -c "$WASM_FILE" | wc -c)
          echo "wasm-opt: raw ${PRE_SIZE} -> ${POST_SIZE} bytes; gzipped ${PRE_GZIP} -> ${POST_GZIP} bytes"
          echo "## WASM size" >> $GITHUB_STEP_SUMMARY
          echo "Raw:     ${PRE_SIZE} -> ${POST_SIZE} bytes" >> $GITHUB_STEP_SUMMARY
          echo "Gzipped: ${PRE_GZIP} -> ${POST_GZIP} bytes" >> $GITHUB_STEP_SUMMARY
      - name: Place fonts, SPA fallback, disable Jekyll
        run: |
          rm -rf dist/fonts
          mkdir -p dist/fonts
          cp -v public/fonts/*.woff2 dist/fonts/
          test -f dist/fonts/geist-400.woff2
          test -f dist/fonts/geist-500.woff2
          test -f dist/fonts/jbmono-400.woff2
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - name: Verify resume PDF present and real
        run: test $(stat -c%s dist/pdfs/resume.pdf) -gt 100000
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
