name: CI
on:
  push:
    branches: ["revamp", "main"]
  pull_request:
    branches: ["revamp", "main"]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (csr default, wasm32)
        run: cargo check --target wasm32-unknown-unknown
      - name: cargo check (ssr)
        run: cargo check --no-default-features --features ssr
      - name: cargo check (hydrate, wasm32)
        run: cargo check --no-default-features --features "hydrate sqlite" --target wasm32-unknown-unknown
