    <!-- GitHub Pages does not honor _headers / response-header config files,
         so security headers are inlined as <meta http-equiv> below. If/when this
         site moves behind a CDN (Cloudflare Pages, Workers), prefer real HTTP
         response headers via public/_headers and remove these meta tags.

         CSP NOTE — unsafe-inline retained intentionally (see docs/DECISIONS.md ADR-006):
         Trunk 0.21 generates a <script type="module"> in dist/index.html containing a
         content-hashed filename that changes on every build. Pinning a static SHA-256 hash
         is CI-incompatible. Revisit when Trunk supports nonce injection or when the site
         moves to a CDN that supports hash computation in a post-build step. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'">

    <!-- Trunk directives ─────────────────────────────────────── -->
    <!-- Build and inject the WASM app (required for any output).
         Trunk emits the Wasm script with type="module"; no defer/async needed. -->
    <!-- data-wasm-opt="0" disables Trunk's built-in wasm-opt pass. wasm-opt is run
         manually in deploy.yml after trunk build with --all-features (required for
         the bulk-memory + nontrapping-float-to-int extensions used by this binary).
         Trunk 0.21 does not support passthrough wasm-opt args, so manual pass is needed. -->
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <!-- Wasm preload: Trunk does not support data-trunk rel="preload"; inject at runtime from loader script. -->
    <!-- Bundle the custom stylesheet into dist/ -->
    <link data-trunk rel="scss" href="style/style.scss"/>
    <!-- Single asset root: all served assets live under public/. Trunk copy-dir
         directives below copy each subdirectory to dist/ at its same path. -->
    <link data-trunk rel="copy-dir" href="public/fonts" />
    <!-- Writeup and project content JSON (lazy-loaded at runtime) -->
    <link data-trunk rel="copy-dir" href="public/writeups"/>
    <link data-trunk rel="copy-dir" href="public/projects"/>
    <link data-trunk rel="copy-dir" href="public/docs"/>

    <script>
    // Insert Wasm preload hint: Trunk does not support data-trunk rel="preload".
    // Derive .wasm URL from modulepreload href (xxx.js -> xxx_bg.wasm) or from script[src].
    (function() {
      var wasmHref = null;
      var modulepreload = document.querySelector('link[rel="modulepreload"]');
      if (modulepreload) {
        var h = modulepreload.getAttribute('href');
        if (h && h.indexOf('.js') !== -1) wasmHref = h.replace(/\.js$/, '_bg.wasm');
      }
      if (!wasmHref) {
        var scripts = document.querySelectorAll('script[src*=".js"]');
        for (var i = 0; i < scripts.length; i++) {
          var s = scripts[i].getAttribute('src');
          if (s) { wasmHref = s.replace(/\.js$/, '_bg.wasm'); break; }
        }
      }
      if (wasmHref) {
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'fetch';
        link.type = 'application/wasm';
        link.crossOrigin = 'anonymous';
        link.href = wasmHref;
        document.head.appendChild(link);
      }
    })();
    </script>

<!-- FOUC guard: matches dark-mode default. Overridden by create_effect in main.rs -->
<body style="background-color: #080c14;">

    </div>
  </noscript>
  <!-- Visible fallback: disappears once WASM mounts successfully.
       If you still see this text after 10 seconds, the WASM is not running. -->
  <div id="wasm-init-indicator"
       style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
              color:#22d3ee;font-family:monospace;font-size:13px;text-align:center;
              pointer-events:none;">
    <div>Initializing…</div>
    <div style="margin-top:6px;font-size:10px;color:#4a6380;">
      If this does not disappear, open DevTools → Console for errors
    </div>
  </div>
  <script>
  (function() {
    setTimeout(function() {
      var el = document.getElementById('wasm-init-indicator');
      if (el && el.parentNode) {
        el.innerHTML = '<div style="color:#94a3b8;">App failed to load. Check the console or refresh.</div>';
        el.id = '';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 8000);
      }
    }, 10000);
  })();
  </script>
</body>
