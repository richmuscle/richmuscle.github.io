<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="tf-gcp-title tf-gcp-desc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="tf-gcp-title">Terraform GCP Landing Zone — Architecture</title>
  <desc id="tf-gcp-desc">Flow from developer commit through GitHub Actions with security gate, OIDC federation, and GCS state backend, producing a Private-First VPC landing zone with Cloud NAT, IAP admin tunnel, IAM service accounts, and Secret Manager.</desc>

  <!-- Color tokens (dark-mode optimized; visible on both themes) -->
  <defs>
    <style>
      .ln    { stroke:#3b4a63; stroke-width:1.4; fill:none; }
      .ln-accent { stroke:#22d3ee; stroke-width:1.6; fill:none; }
      .arrow { fill:#22d3ee; }
      .arrow-neutral { fill:#64748b; }
      .box   { fill:none; stroke:#3b4a63; stroke-width:1.2; rx:8; ry:8; }
      .box-accent { fill:none; stroke:#22d3ee; stroke-width:1.6; rx:8; ry:8; }
      .box-soft  { fill:rgba(34,211,238,0.04); stroke:#22d3ee; stroke-width:1; rx:8; ry:8; }
      .swim  { fill:rgba(148,163,184,0.04); stroke:#3b4a63; stroke-width:1; stroke-dasharray:4 4; rx:10; ry:10; }
      .t-h1  { fill:#cbd5e1; font-size:11px; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; }
      .t-h2  { fill:#e2e8f0; font-size:13px; font-weight:700; }
      .t-body{ fill:#94a3b8; font-size:11px; }
      .t-mono{ fill:#94a3b8; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; letter-spacing:0.5px; }
      .t-accent{ fill:#22d3ee; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" class="arrow"/>
    </marker>
    <marker id="arr-n" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" class="arrow-neutral"/>
    </marker>
  </defs>

  <!-- ===== SWIMLANE LABELS ===== -->
  <text x="24" y="34" class="t-h1">Source → CI</text>
  <text x="430" y="34" class="t-h1">Federation + State</text>
  <text x="830" y="34" class="t-h1">GCP Landing Zone</text>

  <!-- swimlane dividers -->
  <rect x="16"   y="54" width="380" height="520" class="swim"/>
  <rect x="410"  y="54" width="380" height="520" class="swim"/>
  <rect x="804"  y="54" width="380" height="520" class="swim"/>

  <!-- ===== LANE 1: Source → CI ===== -->

  <!-- Developer laptop -->
  <rect x="56" y="100" width="240" height="72" class="box"/>
  <text x="72" y="132" class="t-h2">Developer</text>
  <text x="72" y="152" class="t-mono">git commit · pull request</text>

  <!-- GitHub Actions -->
  <rect x="56" y="210" width="240" height="140" class="box"/>
  <text x="72" y="242" class="t-h2">GitHub Actions CI</text>
  <text x="72" y="264" class="t-mono">1. security-gate</text>
  <text x="80" y="284" class="t-accent">tfsec</text>
  <text x="132" y="284" class="t-mono">+</text>
  <text x="146" y="284" class="t-accent">checkov</text>
  <text x="72" y="306" class="t-mono">2. terraform plan</text>
  <text x="72" y="326" class="t-mono">3. terraform apply</text>

  <!-- Vertical arrow laptop → CI -->
  <line x1="176" y1="172" x2="176" y2="202" class="ln" marker-end="url(#arr-n)"/>

  <!-- CI output artifact -->
  <rect x="56" y="390" width="240" height="54" class="box"/>
  <text x="72" y="418" class="t-h2">Apply log + plan diff</text>
  <text x="72" y="436" class="t-mono">retained as workflow artifact</text>

  <line x1="176" y1="350" x2="176" y2="382" class="ln" marker-end="url(#arr-n)"/>

  <!-- ===== LANE 2: Federation + State ===== -->

  <!-- Workload Identity Federation -->
  <rect x="448" y="100" width="300" height="100" class="box-accent"/>
  <text x="464" y="128" class="t-h2">Workload Identity Federation</text>
  <text x="464" y="150" class="t-accent">OIDC · short-lived impersonation</text>
  <text x="464" y="170" class="t-mono">no long-lived JSON keys on</text>
  <text x="464" y="186" class="t-mono">disk, in git, or in secrets</text>

  <!-- Arrow CI → WIF -->
  <line x1="296" y1="268" x2="446" y2="150" class="ln-accent" marker-end="url(#arr)"/>
  <text x="310" y="212" class="t-mono" fill="#22d3ee">OIDC token</text>

  <!-- Service Account -->
  <rect x="448" y="220" width="300" height="62" class="box"/>
  <text x="464" y="246" class="t-h2">Service Account (per-env)</text>
  <text x="464" y="266" class="t-mono">terraform-apply-sa@...iam.gserviceaccount.com</text>

  <line x1="598" y1="200" x2="598" y2="218" class="ln-accent" marker-end="url(#arr)"/>

  <!-- GCS state bucket -->
  <rect x="448" y="320" width="300" height="110" class="box"/>
  <text x="464" y="348" class="t-h2">GCS remote state</text>
  <text x="464" y="370" class="t-mono">bucket: landing-zone-tfstate-...</text>
  <text x="464" y="388" class="t-mono">prefix: envs/core/v1</text>
  <text x="464" y="408" class="t-accent">native object-lock on apply</text>

  <line x1="598" y1="282" x2="598" y2="318" class="ln" marker-end="url(#arr-n)"/>

  <!-- Policy gates -->
  <rect x="448" y="456" width="300" height="78" class="box"/>
  <text x="464" y="482" class="t-h2">Policy validation (pre-apply)</text>
  <text x="464" y="504" class="t-mono">tfsec HIGH = hard fail</text>
  <text x="464" y="522" class="t-mono">checkov advisory = soft</text>

  <line x1="598" y1="430" x2="598" y2="454" class="ln" marker-end="url(#arr-n)"/>

  <!-- ===== LANE 3: GCP Landing Zone ===== -->

  <!-- Landing Zone container -->
  <rect x="830" y="100" width="338" height="456" class="box-soft"/>
  <text x="846" y="128" class="t-h2">Landing Zone (target state)</text>

  <!-- Private VPC -->
  <rect x="854" y="150" width="290" height="80" class="box"/>
  <text x="870" y="174" class="t-h2">Private-First VPC</text>
  <text x="870" y="194" class="t-mono">auto_create_subnetworks = false</text>
  <text x="870" y="212" class="t-accent">0 public IPv4 on compute tier</text>

  <!-- Cloud NAT -->
  <rect x="854" y="246" width="140" height="70" class="box"/>
  <text x="868" y="270" class="t-h2">Cloud NAT</text>
  <text x="868" y="288" class="t-mono">controlled</text>
  <text x="868" y="304" class="t-mono">egress · logged</text>

  <!-- IAP tunnel -->
  <rect x="1004" y="246" width="140" height="70" class="box"/>
  <text x="1018" y="270" class="t-h2">IAP tunnel</text>
  <text x="1018" y="288" class="t-mono">admin SSH</text>
  <text x="1018" y="304" class="t-mono">via IAM</text>

  <!-- IAM -->
  <rect x="854" y="332" width="140" height="70" class="box"/>
  <text x="868" y="356" class="t-h2">IAM</text>
  <text x="868" y="374" class="t-mono">least-privilege</text>
  <text x="868" y="390" class="t-mono">SA-per-module</text>

  <!-- Secret Manager -->
  <rect x="1004" y="332" width="140" height="70" class="box"/>
  <text x="1018" y="356" class="t-h2">Secret Manager</text>
  <text x="1018" y="374" class="t-mono">no .tfvars</text>
  <text x="1018" y="390" class="t-mono">no plaintext</text>

  <!-- Compute / workloads -->
  <rect x="854" y="418" width="290" height="54" class="box"/>
  <text x="870" y="440" class="t-h2">Compute · workloads</text>
  <text x="870" y="458" class="t-mono">private subnets, CIS-hardened images</text>

  <!-- Audit sinks -->
  <rect x="854" y="488" width="290" height="54" class="box"/>
  <text x="870" y="510" class="t-h2">Audit + VPC Flow Logs</text>
  <text x="870" y="528" class="t-mono">sink → Cloud Logging + BigQuery</text>

  <!-- Apply arrow: Policy → Landing Zone -->
  <path d="M 748 495 C 790 495, 790 240, 828 240" class="ln-accent" fill="none" marker-end="url(#arr)"/>
  <text x="756" y="376" class="t-accent" transform="rotate(90 756 376)">terraform apply</text>

  <!-- State read-back arrow: Landing Zone → GCS state -->
  <path d="M 828 372 C 790 372, 790 400, 752 400" class="ln" fill="none" marker-end="url(#arr-n)" stroke-dasharray="3 3"/>
  <text x="760" y="390" class="t-mono">state read-back</text>

  <!-- Footer legend -->
  <text x="24" y="600" class="t-mono">solid line: control flow · dashed line: state reconciliation</text>
</svg>
