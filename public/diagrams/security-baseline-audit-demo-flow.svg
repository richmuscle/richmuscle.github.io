<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="tf-demo-title tf-demo-desc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="tf-demo-title">Terraform GCP Landing Zone — Drift Detection + Reconciliation Flow</title>
  <desc id="tf-demo-desc">A six-stage timeline: baseline hardened, drift injected via console, nightly plan detects, CI opens PR with revert, operator approves, state reconciled back to baseline.</desc>

  <defs>
    <style>
      .ln    { stroke:#3b4a63; stroke-width:1.4; fill:none; }
      .ln-ok { stroke:#10b981; stroke-width:2; fill:none; }
      .ln-bad{ stroke:#f59e0b; stroke-width:2; fill:none; }
      .box    { fill:none; stroke:#3b4a63; stroke-width:1.2; rx:8; ry:8; }
      .box-ok { fill:rgba(16,185,129,0.05); stroke:#10b981; stroke-width:1.4; rx:8; ry:8; }
      .box-bad{ fill:rgba(245,158,11,0.05); stroke:#f59e0b; stroke-width:1.4; rx:8; ry:8; }
      .box-fix{ fill:rgba(34,211,238,0.05); stroke:#22d3ee; stroke-width:1.4; rx:8; ry:8; }
      .t-h2     { fill:#e2e8f0; font-size:13px; font-weight:700; }
      .t-body   { fill:#94a3b8; font-size:11px; }
      .t-mono   { fill:#94a3b8; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; letter-spacing:0.5px; }
      .t-ok     { fill:#10b981; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
      .t-bad    { fill:#f59e0b; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
      .t-fix    { fill:#22d3ee; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
      .t-step   { fill:#64748b; font-size:9.5px; font-family:'JetBrains Mono', ui-monospace, monospace; font-weight:700; letter-spacing:1.5px; }
    </style>
    <marker id="m-ok" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#10b981"/>
    </marker>
    <marker id="m-bad" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#f59e0b"/>
    </marker>
    <marker id="m-fix" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#22d3ee"/>
    </marker>
    <marker id="m-n" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Timeline axis -->
  <line x1="60" y1="200" x2="1140" y2="200" class="ln" stroke-dasharray="2 3"/>

  <!-- Stage 1: Baseline -->
  <text x="100" y="92" class="t-step">STEP 01</text>
  <rect x="60" y="100" width="160" height="86" class="box-ok"/>
  <text x="76" y="126" class="t-h2">Baseline</text>
  <text x="76" y="146" class="t-ok">terraform plan</text>
  <text x="76" y="162" class="t-mono">no diff · 87/92 CIS</text>
  <text x="76" y="178" class="t-mono">0 public IPv4</text>
  <circle cx="140" cy="200" r="5" fill="#10b981"/>
  <text x="60" y="230" class="t-ok">t0</text>

  <!-- Stage 2: Drift injected -->
  <text x="274" y="92" class="t-step">STEP 02</text>
  <rect x="240" y="100" width="160" height="86" class="box-bad"/>
  <text x="256" y="126" class="t-h2">Drift injected</text>
  <text x="256" y="146" class="t-bad">via console</text>
  <text x="256" y="162" class="t-mono">allow-all-tcp</text>
  <text x="256" y="178" class="t-mono">0.0.0.0/0 ingress</text>
  <circle cx="320" cy="200" r="5" fill="#f59e0b"/>
  <text x="240" y="230" class="t-bad">t+1m</text>

  <!-- Stage 3: Detection -->
  <text x="454" y="92" class="t-step">STEP 03</text>
  <rect x="420" y="100" width="160" height="86" class="box-bad"/>
  <text x="436" y="126" class="t-h2">Detection</text>
  <text x="436" y="146" class="t-bad">nightly cron</text>
  <text x="436" y="162" class="t-mono">terraform plan</text>
  <text x="436" y="178" class="t-mono">+1 resource to destroy</text>
  <circle cx="500" cy="200" r="5" fill="#f59e0b"/>
  <text x="420" y="230" class="t-bad">t+6h</text>

  <!-- Stage 4: CI opens PR -->
  <text x="634" y="92" class="t-step">STEP 04</text>
  <rect x="600" y="100" width="160" height="86" class="box-bad"/>
  <text x="616" y="126" class="t-h2">CI opens PR</text>
  <text x="616" y="146" class="t-bad">tfsec gate fails</text>
  <text x="616" y="162" class="t-mono">CRITICAL finding</text>
  <text x="616" y="178" class="t-mono">public-ingress rule</text>
  <circle cx="680" cy="200" r="5" fill="#f59e0b"/>
  <text x="600" y="230" class="t-mono">t+6h+30s</text>

  <!-- Stage 5: Reconcile -->
  <text x="814" y="92" class="t-step">STEP 05</text>
  <rect x="780" y="100" width="160" height="86" class="box-fix"/>
  <text x="796" y="126" class="t-h2">Operator review</text>
  <text x="796" y="146" class="t-fix">approve revert</text>
  <text x="796" y="162" class="t-mono">terraform apply</text>
  <text x="796" y="178" class="t-mono">rule destroyed</text>
  <circle cx="860" cy="200" r="5" fill="#22d3ee"/>
  <text x="780" y="230" class="t-fix">t+8h</text>

  <!-- Stage 6: Back to baseline -->
  <text x="994" y="92" class="t-step">STEP 06</text>
  <rect x="960" y="100" width="180" height="86" class="box-ok"/>
  <text x="976" y="126" class="t-h2">Back to baseline</text>
  <text x="976" y="146" class="t-ok">state verified</text>
  <text x="976" y="162" class="t-mono">tfsec = 0 HIGH</text>
  <text x="976" y="178" class="t-mono">state v14 → v15 (+1)</text>
  <circle cx="1050" cy="200" r="5" fill="#10b981"/>
  <text x="960" y="230" class="t-ok">t+8h+5m</text>

  <!-- Connectors between stages -->
  <line x1="220" y1="143" x2="240" y2="143" class="ln-bad" marker-end="url(#m-bad)"/>
  <line x1="400" y1="143" x2="420" y2="143" class="ln-bad" marker-end="url(#m-bad)"/>
  <line x1="580" y1="143" x2="600" y2="143" class="ln-bad" marker-end="url(#m-bad)"/>
  <line x1="760" y1="143" x2="780" y2="143" class="ln-fix" marker-end="url(#m-fix)"/>
  <line x1="940" y1="143" x2="960" y2="143" class="ln-ok" marker-end="url(#m-ok)"/>

  <!-- Legend -->
  <text x="60" y="290" class="t-mono">State colour:</text>
  <rect x="175" y="278" width="14" height="14" class="box-ok"/>
  <text x="195" y="290" class="t-ok">baseline / good</text>
  <rect x="320" y="278" width="14" height="14" class="box-bad"/>
  <text x="340" y="290" class="t-bad">drift / bad</text>
  <rect x="435" y="278" width="14" height="14" class="box-fix"/>
  <text x="455" y="290" class="t-fix">reconciliation / fix</text>

  <text x="60" y="324" class="t-mono">Every stage is verifiable: plan output, tfsec exit code, gcloud listings, and audit logs are captured below.</text>
</svg>
