# Cargo-deny configuration for security and license compliance
# cargo-deny 0.19.x schema
# Run: cargo deny check

[advisories]
# Ignore advisories for transitive Leptos 0.6.x dependencies we cannot fix upstream.
# Review each entry when upgrading Leptos.
ignore = [
    # instant 0.1.13 via leptos_router → cached — unmaintained
    "RUSTSEC-2024-0384",
    # paste 1.0.15 via leptos_reactive / leptos_dom — unmaintained
    "RUSTSEC-2024-0436",
    # proc-macro-error 1.0.4 via rstml → leptos_macro — unmaintained
    "RUSTSEC-2024-0370",
    # lru Stacked Borrows issue via leptos_reactive — unsound but unexploitable in WASM
    "RUSTSEC-2026-0002",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "BSL-1.0",
]
confidence-threshold = 0.8

[licenses.private]
# Ignore the workspace crate itself — it has no published license field
ignore = true

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
